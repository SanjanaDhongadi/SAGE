apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app-1
  template:
    metadata:
      labels:
        app: flask-app-1
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube-m03
      containers:
      - name: flask
        image: python:3.11-slim
        command: ["python", "-c", "from http.server import HTTPServer, BaseHTTPRequestHandler; HTTPServer(('', 5000), BaseHTTPRequestHandler).serve_forever()"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
