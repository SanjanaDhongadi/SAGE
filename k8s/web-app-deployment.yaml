apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app-1
  template:
    metadata:
      labels:
        app: web-app-1
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube-m02
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
